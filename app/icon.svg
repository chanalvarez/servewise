<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Purple gradient rounded square background — matches app header icon -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Layers icon: three stacked diamond slabs in white -->
  <!-- Top slab -->
  <polygon points="50,24 20,36 50,48 80,36" fill="white"/>
  <!-- Middle slab -->
  <polygon points="50,38 20,50 50,62 80,50" fill="rgba(255,255,255,0.7)"/>
  <!-- Bottom slab -->
  <polygon points="50,52 20,64 50,76 80,64" fill="rgba(255,255,255,0.4)"/>
</svg>
